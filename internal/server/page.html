<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Checking your browser…</title>
<style>
  :root {
    color-scheme: light dark;
    --bg: #fafafa;
    --fg: #1c1c22;
    --muted: #70707c;
    --accent: #3b6ef6;
    --head: #d9dde6;
    --face: #f4f6fa;
    --outline: #b6bcc9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15151b;
      --fg: #e6e6ea;
      --muted: #9a9aa6;
      --accent: #7c96ff;
      --head: #2c2c38;
      --face: #3a3a48;
      --outline: #4b4b5a;
    }
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
  }
  main { text-align: center; padding: 2em 1.5em; max-width: 26em; }
  h1 { font-size: 1.2em; font-weight: 600; margin: 1em 0 0.25em; }
  #status { margin: 0.25em 0 1.25em; color: var(--muted); }
  progress { width: min(18em, 75vw); accent-color: var(--accent); }
  small { display: block; margin-top: 2.5em; color: var(--muted); line-height: 1.5; }
  .beacon { animation: pulse 1.6s ease-in-out infinite; }
  .eyes {
    animation: blink 4s infinite;
    transform-origin: center;
    transform-box: fill-box;
  }
  @keyframes pulse { 50% { opacity: 0.25; } }
  @keyframes blink {
    0%, 94%, 100% { transform: scaleY(1); }
    97% { transform: scaleY(0.08); }
  }
  @media (prefers-reduced-motion: reduce) {
    .beacon, .eyes { animation: none; }
  }
</style>
</head>
<body data-challenge="{{.Challenge}}" data-difficulty="{{.Difficulty}}">
<main>
  <svg viewBox="0 0 128 118" width="112" height="108" aria-hidden="true">
    <line x1="64" y1="18" x2="64" y2="30" stroke="var(--outline)" stroke-width="4" stroke-linecap="round"/>
    <circle class="beacon" cx="64" cy="12" r="6" fill="var(--accent)"/>
    <rect x="10" y="62" width="10" height="26" rx="5" fill="var(--outline)"/>
    <rect x="108" y="62" width="10" height="26" rx="5" fill="var(--outline)"/>
    <rect x="22" y="30" width="84" height="82" rx="18" fill="var(--head)"/>
    <rect x="34" y="46" width="60" height="50" rx="12" fill="var(--face)"/>
    <g class="eyes" fill="var(--accent)">
      <circle cx="52" cy="67" r="6.5"/>
      <circle cx="76" cy="67" r="6.5"/>
    </g>
    <rect x="55" y="82" width="18" height="5" rx="2.5" fill="var(--accent)"/>
  </svg>
  <h1>Checking your browser</h1>
  <p id="status">Computing a small proof of work&hellip;</p>
  <progress id="bar" max="1" value="0"></progress>
  <small>This site asks your browser for a one-time computation to deter
  mass scraping. Nothing about you is collected or stored.</small>
  <noscript><p>JavaScript is required to pass this check.</p></noscript>
</main>
<script>
"use strict";

// Find a counter such that SHA256(challenge + "." + counter) has at least
// `difficulty` leading zero bits, then POST it to /.powd/verify and reload.
// Hashing uses the browser's own SHA-256 (crypto.subtle), so this page
// ships no cryptographic code. Workers partition the counter space by
// striding: worker k of n tests k, k+n, k+2n, … — disjoint by construction.

// workerMain runs inside each Worker (serialized via toString below), so
// it must be entirely self-contained.
function workerMain() {
  function leadingZeroBits(digest) {
    let n = 0;
    for (const byte of digest) {
      if (byte === 0) { n += 8; continue; }
      for (let b = byte; !(b & 0x80); b <<= 1) n++;
      break;
    }
    return n;
  }

  onmessage = async ({ data: { challenge, difficulty, start, stride } }) => {
    const encoder = new TextEncoder();
    const batch = 256;
    for (let counter = start; ; ) {
      for (let i = 0; i < batch; i++, counter += stride) {
        const input = encoder.encode(challenge + "." + counter);
        const digest = new Uint8Array(await crypto.subtle.digest("SHA-256", input));
        if (leadingZeroBits(digest) >= difficulty) {
          postMessage({ solution: String(counter) });
          return;
        }
      }
      postMessage({ hashed: batch });
    }
  };
}

const { challenge, difficulty } = document.body.dataset;
const statusEl = document.getElementById("status");
const bar = document.getElementById("bar");

const expected = 2 ** Number(difficulty);
let hashed = 0;
let done = false;
const workers = [];

function onProgress(count) {
  hashed += count;
  // Honest progress: the probability that a search of this length would
  // already have found a solution.
  bar.value = 1 - (1 - 1 / expected) ** hashed;
}

async function onSolution(solution) {
  if (done) return; // two workers may finish near-simultaneously
  done = true;
  for (const w of workers) w.terminate();
  bar.value = 1;
  statusEl.textContent = "Verifying…";
  try {
    const response = await fetch("/.powd/verify", {
      method: "POST",
      body: new URLSearchParams({ challenge, solution }),
    });
    if (response.status !== 204) throw new Error("rejected");
    location.reload();
  } catch {
    statusEl.textContent = "Verification failed. Reload the page to retry.";
  }
}

if (!crypto.subtle) {
  // WebCrypto needs a secure context (HTTPS, or localhost in testing).
  statusEl.textContent = "This check needs a secure (HTTPS) connection.";
} else {
  const source = URL.createObjectURL(
    new Blob(["(", workerMain.toString(), ")()"], { type: "text/javascript" })
  );
  const concurrency = Math.min(navigator.hardwareConcurrency || 2, 8);
  for (let i = 0; i < concurrency; i++) {
    const worker = new Worker(source);
    worker.onmessage = ({ data }) =>
      data.solution !== undefined ? onSolution(data.solution) : onProgress(data.hashed);
    worker.postMessage({
      challenge,
      difficulty: Number(difficulty),
      start: i,
      stride: concurrency,
    });
    workers.push(worker);
  }
}
</script>
</body>
</html>
